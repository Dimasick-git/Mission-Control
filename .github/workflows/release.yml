name: Release

defaults:
  run:
    shell: bash

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish release if APP_VERSION changed
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install libjpeg-turbo (libstratosphere dep)
        run: dkp-pacman -S --noconfirm --needed switch-libjpeg-turbo

      - name: Resolve target tag and check if release exists
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Mission-Control uses the GIT_TAG fallback in Makefile as its source of truth
          APP_VERSION=$(grep -E '^\s*GIT_TAG\s*:=' Makefile | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 | tr -d 'v')
          if [ -z "$APP_VERSION" ]; then
            echo "::error::Could not extract APP_VERSION from Makefile GIT_TAG fallback."
            exit 1
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${APP_VERSION}"
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping (idempotent)."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Will publish: $TAG"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Create & push tag (if not from tag push)
        if: steps.tag.outputs.should_release == 'true' && !startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git config user.name  'ryazhahand-release-bot'
            git config user.email 'ryazhahand-release-bot@users.noreply.github.com'
            git tag -a "$TAG" -m "Auto-release on APP_VERSION change: $TAG"
            git push origin "$TAG"
          fi

      - name: make dist
        if: steps.tag.outputs.should_release == 'true'
        run: make dist -j$(nproc)

      - name: Locate built zip
        id: zip
        if: steps.tag.outputs.should_release == 'true'
        run: |
          set -e
          F=$(ls dist/*.zip | head -1)
          echo "path=$F" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $F)" >> "$GITHUB_OUTPUT"
          (cd dist && sha256sum "$(basename $F)" > "$(basename $F).sha256")
          echo "sha256=$(cut -d' ' -f1 < dist/$(basename $F).sha256)" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        if: steps.tag.outputs.should_release == 'true'
        run: |
          set -e
          TAG="${{ steps.tag.outputs.tag }}"
          TAG_NO_V="${TAG#v}"
          BODY=$(awk -v tag="$TAG_NO_V" '
            $0 ~ "^## \[" tag "\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Auto-built release. See [CHANGELOG.md](CHANGELOG.md) for full history."
          fi
          {
            echo 'body<<DELIM'
            echo "$BODY"
            echo ''
            echo '---'
            echo ''
            echo "**SHA-256**: \`${{ steps.zip.outputs.sha256 }}\`"
            echo "**Built from**: \`${GITHUB_SHA::7}\`"
            echo 'DELIM'
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: steps.tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Mission-Control ${{ steps.tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            ${{ steps.zip.outputs.path }}
            dist/${{ steps.zip.outputs.name }}.sha256
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
